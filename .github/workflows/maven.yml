name: CI Build and Test - Matrix

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout ma nguon
        uses: actions/checkout@v4

      - name: Cai dat Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Chay Build va Test
        run: mvn clean package

      - name: Luu file JAR (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: mathutils-jar-${{ matrix.os }}
          path: target/*.jar